name: Build and Push Container Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/mremotify

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ env.APP_VERSION }}
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ env.APP_VERSION }}
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-rdpd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push rdpd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rdpd/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/rdpd:latest
            ${{ env.IMAGE_BASE }}/rdpd:${{ env.APP_VERSION }}
            ${{ env.IMAGE_BASE }}/rdpd:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
